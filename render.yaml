services:
  - type: web
    name: bot-dealer-backend
    runtime: node
    rootDir: backend
    plan: free
    buildCommand: npm install && cd ../frontend && npm install && npm run build
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: OPENAI_MODEL
        value: gpt-4o-mini
